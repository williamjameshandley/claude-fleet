bind-key S choose-tree -Zw -f '#{&&:#{m:fleet@*,#{session_name}},#{!=:#{session_name},fleet@muster}}' -F '#{?#{@fleet_state},#{@fleet_state} #{@fleet_cwd} #{@fleet_host},muster}'

unbind-key -T root Enter
bind-key -T fleet j next-window \; switch-client -T fleet
bind-key -T fleet k previous-window \; switch-client -T fleet
bind-key -T fleet Down next-window \; switch-client -T fleet
bind-key -T fleet Up previous-window \; switch-client -T fleet
bind-key -T fleet n next-window -a \; switch-client -T fleet
bind-key -T fleet p previous-window -a \; switch-client -T fleet
bind-key -T fleet NPage next-window -a \; switch-client -T fleet
bind-key -T fleet PPage previous-window -a \; switch-client -T fleet
bind-key -T fleet l last-window \; switch-client -T fleet
bind-key -T fleet 0 select-window -t :=0 \; switch-client -T fleet
bind-key -T fleet 1 select-window -t :=1 \; switch-client -T fleet
bind-key -T fleet 2 select-window -t :=2 \; switch-client -T fleet
bind-key -T fleet 3 select-window -t :=3 \; switch-client -T fleet
bind-key -T fleet 4 select-window -t :=4 \; switch-client -T fleet
bind-key -T fleet 5 select-window -t :=5 \; switch-client -T fleet
bind-key -T fleet 6 select-window -t :=6 \; switch-client -T fleet
bind-key -T fleet 7 select-window -t :=7 \; switch-client -T fleet
bind-key -T fleet 8 select-window -t :=8 \; switch-client -T fleet
bind-key -T fleet 9 select-window -t :=9 \; switch-client -T fleet
bind-key -T fleet Escape run-shell -C "select-window -t '#{@fleet_origin}'"
bind-key -T fleet Any switch-client -T root
